<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🍬 таймер до судного дня.</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            width:100vw; height:100vh; overflow:hidden;
            background:#fef9f4; font-family: 'Segoe UI', system-ui, sans-serif;
        }
        canvas { display:block; position:fixed; top:0; left:0; width:100%; height:100%; }
        .gyro-btn {
            position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
            background:rgba(255,255,255,0.8); backdrop-filter:blur(10px);
            border:1px solid rgba(0,0,0,0.1); border-radius:50px;
            padding:12px 28px; font-size:16px; font-weight:bold;
            color:#4a3f6b; box-shadow:0 8px 20px rgba(0,0,0,0.1);
            cursor:pointer; z-index:20; transition:0.2s;
            display:none; /* скрыта по умолчанию */
        }
        .gyro-btn:active { transform:translateX(-50%) scale(0.96); }
    </style>
</head>
<body>
    <canvas id="candyCanvas"></canvas>
    <button id="gyroButton" class="gyro-btn">📳 включить движение</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script>
    (function() {
        const canvas = document.getElementById('candyCanvas');
        const ctx = canvas.getContext('2d');
        const gyroBtn = document.getElementById('gyroButton');

        // ==================== НАСТРОЙКИ ====================
        const TOTAL_CANDIES = 500;
        // Даты: от сегодня (24 июня 2026) до 1 августа 2026 – едины для всех
        const START_DATE = new Date('2026-06-24T00:00:00Z');
        const END_DATE = new Date('2026-08-01T00:00:00Z');
        const TOTAL_MS = END_DATE.getTime() - START_DATE.getTime();
        const INTERVAL_MS = TOTAL_MS / TOTAL_CANDIES; // время на одну конфету

        const CANDY_IMAGE_URLS = [
            'candy1.png', 'candy2.png', 'candy3.png',
            'candy4.png', 'candy5.png', 'candy6.png',
            'candy7.png', 'candy8.png', 'candy9.png',
            'candy10.png', 'candy11.png', 'candy12.png',
            'candy13.png', 'candy14.png', 'candy15.png',
            'candy16.png', 'candy17.png', 'candy18.png'
        ];
        const CANDY_SCALE = [
            1.05, 1.05, 1.05, 0.85, 1.05, 1.05, 1.05, 1.05, 1.05,
            1.05, 1.05, 1.05, 1.05, 1.05, 0.85, 1.05, 1.05, 1.05
        ];

        let RADIUS = 12;
        let loadedImages = []; // { img, radiusInPixels, offsetX, offsetY, scale }
        let candies = [];
        let totalSpawned = 0;
        let animationId = null;
        let lastTime = 0;

        const engine = Matter.Engine.create({
            enableSleeping: true,
            positionIterations: 10,
            velocityIterations: 8,
            timing: { timeScale: 1 }
        });
        const world = engine.world;

        // Гравитация по умолчанию (вниз)
        const BASE_GRAVITY = 1.0;
        let useGyro = false;
        let gyroActive = false;
        let currentGravity = { x: 0, y: BASE_GRAVITY };

        let ground, leftWall, rightWall;
        let mouse, mouseConstraint;

        // Очередь для постепенного создания конфет при загрузке
        let pendingSpawn = 0;
        let spawnIntervalId = null;

        function calcRadius() {
            const w = canvas.width, h = canvas.height;
            const minDim = Math.min(w, h);
            return Math.max(6, Math.min(40, Math.floor(minDim / 24)));
        }

        function createBoundaries() {
            if (ground) Matter.World.remove(world, ground);
            if (leftWall) Matter.World.remove(world, leftWall);
            if (rightWall) Matter.World.remove(world, rightWall);
            const w = canvas.width, h = canvas.height;
            ground = Matter.Bodies.rectangle(w/2, h + 50, w, 100, { isStatic: true, friction: 0.8 });
            leftWall = Matter.Bodies.rectangle(-50, h/2, 100, h, { isStatic: true });
            rightWall = Matter.Bodies.rectangle(w + 50, h/2, 100, h, { isStatic: true });
            Matter.World.add(world, [ground, leftWall, rightWall]);
        }

        function createMouse() {
            if (mouseConstraint) Matter.World.remove(world, mouseConstraint);
            mouse = Matter.Mouse.create(canvas);
            mouseConstraint = Matter.MouseConstraint.create(engine, {
                mouse: mouse,
                constraint: { stiffness: 0.2, render: { visible: false } }
            });
            Matter.World.add(world, mouseConstraint);
        }

        // --------------- ГИРОСКОП ------------------
        function setupGyro() {
            if (!window.DeviceOrientationEvent) {
                console.log('Гироскоп не поддерживается');
                return;
            }
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                // iOS 13+ – показываем кнопку
                gyroBtn.style.display = 'block';
                gyroBtn.addEventListener('click', async () => {
                    try {
                        const perm = await DeviceOrientationEvent.requestPermission();
                        if (perm === 'granted') {
                            enableGyro();
                            gyroBtn.style.display = 'none';
                        }
                    } catch (e) {
                        console.warn('Ошибка запроса гироскопа:', e);
                    }
                }, { once: true });
            } else {
                // Android или старые iOS – включаем сразу
                enableGyro();
            }
        }

        function enableGyro() {
            window.addEventListener('deviceorientation', handleOrientation);
            gyroActive = true;
            useGyro = true;
            console.log('Гироскоп активирован');
        }

        function handleOrientation(event) {
            if (!event.beta || !event.gamma) return;
            const degToRad = Math.PI / 180;
            const gx = Math.sin(event.gamma * degToRad);
            const gy = Math.sin(event.beta * degToRad);
            const len = Math.sqrt(gx*gx + gy*gy) || 1;
            currentGravity = {
                x: (gx / len) * BASE_GRAVITY,
                y: (gy / len) * BASE_GRAVITY
            };
            engine.gravity.x = currentGravity.x;
            engine.gravity.y = currentGravity.y;
        }

        // --------------- АНАЛИЗ ИЗОБРАЖЕНИЙ ---------------
        function analyzeImageSafely(img) {
            const w = img.naturalWidth, h = img.naturalHeight;
            if (w === 0 || h === 0) return { radiusInPixels: RADIUS, offsetX: 0, offsetY: 0 };
            try {
                const off = document.createElement('canvas');
                off.width = w; off.height = h;
                const offCtx = off.getContext('2d');
                offCtx.drawImage(img, 0, 0);
                const data = offCtx.getImageData(0, 0, w, h).data;
                let minX = w, minY = h, maxX = 0, maxY = 0;
                for (let y = 0; y < h; y++) {
                    for (let x = 0; x < w; x++) {
                        if (data[(y*w+x)*4+3] > 10) {
                            if (x < minX) minX = x;
                            if (y < minY) minY = y;
                            if (x > maxX) maxX = x;
                            if (y > maxY) maxY = y;
                        }
                    }
                }
                if (minX > maxX) { minX = 0; minY = 0; maxX = w-1; maxY = h-1; }
                const rad = Math.max(maxX-minX+1, maxY-minY+1) / 2;
                const offX = w/2 - (minX+maxX)/2;
                const offY = h/2 - (minY+maxY)/2;
                return { radiusInPixels: rad, offsetX: offX, offsetY: offY };
            } catch (e) {
                return { radiusInPixels: Math.max(w,h)/2, offsetX: 0, offsetY: 0 };
            }
        }

        async function loadImages(urls, scales) {
            if (!urls?.length) return [];
            const proms = urls.map((url, i) => new Promise(resolve => {
                const img = new Image();
                img.src = url;
                img.onload = () => {
                    const analysis = analyzeImageSafely(img);
                    resolve({ img, ...analysis, scale: scales[i] || 1.0 });
                };
                img.onerror = () => resolve(null);
            }));
            return (await Promise.all(proms)).filter(i => i);
        }

        // --------------- ФОН (ПАРАЛЛАКС) ---------------
        const BG_CANDIES_COUNT = 20;
        let bgCandies = [];
        function createBgCandy(yPos) {
            const r = RADIUS * 1.2;
            return {
                x: Math.random() * canvas.width,
                y: yPos ?? (Math.random() * (canvas.height + 2*r) - r),
                vy: 6 + Math.random() * 12,
                radius: r,
                image: loadedImages.length ? loadedImages[Math.floor(Math.random() * loadedImages.length)].img : null,
                color: `hsl(${Math.random()*360},65%,80%)`
            };
        }
        function initBgCandies() {
            bgCandies = [];
            for (let i = 0; i < BG_CANDIES_COUNT; i++) {
                bgCandies.push(createBgCandy());
            }
        }

        // --------------- КОНФЕТЫ ---------------
        function spawnCandy() {
            const r = RADIUS;
            const src = loadedImages.length ? loadedImages[Math.floor(Math.random() * loadedImages.length)] : null;
            const img = src?.img || null;
            const radPx = src?.radiusInPixels || r;
            const offX = src?.offsetX || 0;
            const offY = src?.offsetY || 0;
            const scaleOverride = src?.scale || 1.0;

            const body = Matter.Bodies.circle(0, 0, r, {
                restitution: 0.35, friction: 0.6, frictionAir: 0.05, density: 0.005
            });
            const x = r + Math.random() * (canvas.width - 2*r);
            const y = -r - Math.random() * 180;
            Matter.Body.setPosition(body, { x, y });

            body.renderData = { image: img, color: `hsl(${Math.random()*360},70%,75%)`, radiusInPixels: radPx, offsetX: offX, offsetY: offY, scaleOverride };
            Matter.World.add(world, body);
            candies.push(body);
            totalSpawned++;
        }

        function processPendingSpawns() {
            if (pendingSpawn <= 0) {
                if (spawnIntervalId) { clearInterval(spawnIntervalId); spawnIntervalId = null; }
                return;
            }
            // Создаём по одной конфете с интервалом 60 мс
            if (!spawnIntervalId) {
                spawnIntervalId = setInterval(() => {
                    if (pendingSpawn <= 0) {
                        clearInterval(spawnIntervalId);
                        spawnIntervalId = null;
                        return;
                    }
                    spawnCandy();
                    pendingSpawn--;
                }, 60);
            }
        }

        // Вычисляем, сколько конфет должно быть сейчас
        function getExpectedCount() {
            const now = Date.now();
            const elapsed = now - START_DATE.getTime();
            return Math.min(TOTAL_CANDIES, Math.max(0, Math.floor(elapsed / INTERVAL_MS)));
        }

        // --------------- ОТРИСОВКА ---------------
        function drawCandy(ctx, body, alpha = 1) {
            const rd = body.renderData;
            if (!rd) return;
            const { x, y } = body.position;
            const angle = body.angle;
            const img = rd.image;
            const color = rd.color;
            const radPx = rd.radiusInPixels || RADIUS;
            const offX = rd.offsetX || 0;
            const offY = rd.offsetY || 0;
            const r = RADIUS;
            const scaleOverride = rd.scaleOverride || 1.0;

            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.globalAlpha = alpha;
            ctx.shadowColor = 'rgba(0,0,0,0.08)';
            ctx.shadowBlur = 3;
            ctx.shadowOffsetY = 1;

            if (img?.complete && img.naturalWidth > 0) {
                const scale = r / radPx;
                const baseW = img.naturalWidth * scale, baseH = img.naturalHeight * scale;
                const drawOffX = offX * scale, drawOffY = offY * scale;
                ctx.drawImage(img, -baseW/2*scaleOverride + drawOffX, -baseH/2*scaleOverride + drawOffY, baseW*scaleOverride, baseH*scaleOverride);
            } else {
                const rad = r * scaleOverride;
                const grad = ctx.createRadialGradient(-rad*0.3, -rad*0.3, rad*0.1, 0, 0, rad);
                grad.addColorStop(0, '#fff');
                grad.addColorStop(0.4, color);
                grad.addColorStop(1, shade(color, -30));
                ctx.beginPath(); ctx.arc(0,0,rad,0,Math.PI*2); ctx.fillStyle=grad; ctx.fill();
                ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=rad*0.2; ctx.stroke();
            }
            ctx.restore();
        }

        function shade(hex,p) {
            if (hex.startsWith('hsl')) return '#f0c0d0';
            const num=parseInt(hex.slice(1),16);
            const r=Math.min(255,Math.max(0,(num>>16)+p));
            const g=Math.min(255,Math.max(0,((num>>8)&0xFF)+p));
            const b=Math.min(255,Math.max(0,(num&0xFF)+p));
            return `rgb(${r},${g},${b})`;
        }

        function drawScene() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            const bgGrad=ctx.createLinearGradient(0,0,0,canvas.height);
            bgGrad.addColorStop(0,'#fef5f9'); bgGrad.addColorStop(0.7,'#f0f6ff'); bgGrad.addColorStop(1,'#e6f3e8');
            ctx.fillStyle=bgGrad; ctx.fillRect(0,0,canvas.width,canvas.height);

            for (const bg of bgCandies) {
                ctx.save(); ctx.translate(bg.x,bg.y); ctx.globalAlpha=0.25;
                if (bg.image) { const s=bg.radius*2.4; ctx.drawImage(bg.image,-s/2,-s/2,s,s); }
                else { ctx.beginPath(); ctx.arc(0,0,bg.radius,0,Math.PI*2); ctx.fillStyle=bg.color; ctx.fill(); }
                ctx.restore();
            }
            const sorted = [...candies].sort((a,b) => a.position.y - b.position.y);
            for (const b of sorted) drawCandy(ctx, b, 1);
        }

        function gameLoop(timestamp) {
            if (!animationId) return;
            const dtMs = Math.min(50, timestamp - (lastTime || timestamp));
            lastTime = timestamp;

            // Продолжаем создавать конфеты по расписанию, если ещё не все
            const expected = getExpectedCount();
            if (totalSpawned < expected) {
                // Добавляем недостающие в pending
                pendingSpawn += (expected - totalSpawned);
                processPendingSpawns();
            }

            Matter.Engine.update(engine, dtMs);
            const dtSec = dtMs / 1000;
            for (const bg of bgCandies) {
                bg.y += bg.vy * dtSec;
                if (bg.y - bg.radius > canvas.height) { bg.y = -bg.radius - Math.random()*50; bg.x = Math.random()*canvas.width; }
            }
            drawScene();
            animationId = requestAnimationFrame(gameLoop);
        }

        function onResize() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const newR = calcRadius();
            if (newR !== RADIUS) {
                RADIUS = newR;
                createBoundaries();
                // Полная перестройка мира с новым радиусом
                for (const b of candies) Matter.World.remove(world, b);
                candies = [];
                totalSpawned = 0;
                pendingSpawn = getExpectedCount();
                processPendingSpawns();
                initBgCandies();
            } else {
                createBoundaries();
                for (const b of candies) Matter.Body.setPosition(b, {
                    x: Math.min(Math.max(b.position.x, RADIUS), canvas.width - RADIUS),
                    y: Math.min(Math.max(b.position.y, RADIUS), canvas.height - RADIUS)
                });
                initBgCandies();
            }
            createMouse();
        }
        window.addEventListener('resize', onResize);

        async function init() {
            try {
                canvas.width = window.innerWidth; canvas.height = window.innerHeight;
                RADIUS = calcRadius();
                loadedImages = await loadImages(CANDY_IMAGE_URLS, CANDY_SCALE);
                createBoundaries();
                createMouse();
                setupGyro(); // кнопка/гироскоп

                // Устанавливаем начальное количество конфет согласно глобальному таймеру
                const expected = getExpectedCount();
                pendingSpawn = expected;
                processPendingSpawns();

                initBgCandies();
                lastTime = 0;
                if (animationId) cancelAnimationFrame(animationId);
                animationId = requestAnimationFrame(gameLoop);
            } catch (e) {
                console.error('Ошибка инициализации:', e);
                RADIUS = calcRadius() || 12;
                createBoundaries();
                initBgCandies();
                lastTime = 0;
                animationId = requestAnimationFrame(gameLoop);
            }
        }
        init();
    })();
    </script>
</body>
</html>
