<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🍬 таймер до судного дня.</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            width:100vw; height:100vh; overflow:hidden;
            background:#0a0a1a; font-family: 'Segoe UI', system-ui, sans-serif;
        }
        canvas { 
            display:block; position:fixed; top:0; left:0; width:100%; height:100%; 
            z-index: 0;
        }
        .gyro-btn {
            position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
            background:rgba(255,255,255,0.8); backdrop-filter:blur(10px);
            border:1px solid rgba(0,0,0,0.1); border-radius:50px;
            padding:12px 28px; font-size:16px; font-weight:bold;
            color:#4a3f6b; box-shadow:0 8px 20px rgba(0,0,0,0.1);
            cursor:pointer; z-index:20; transition:0.2s;
            display:none;
        }
        .gyro-btn:active { transform:translateX(-50%) scale(0.96); }

        #customCursor {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            display: none;
            width: 70px;
            height: auto;
            will-change: left, top;
        }

        body.custom-cursor-active {
            cursor: none;
        }
        body.custom-cursor-active canvas {
            cursor: none;
        }
    </style>
</head>
<body>
    <canvas id="candyCanvas"></canvas>
    <button id="gyroButton" class="gyro-btn">📳 включить движение</button>
    <img id="customCursor" src="hand1.png" alt="курсор">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script>
    (function() {
        const canvas = document.getElementById('candyCanvas');
        const ctx = canvas.getContext('2d');
        const gyroBtn = document.getElementById('gyroButton');
        const cursorImg = document.getElementById('customCursor');

        // ==================== ГЛОБАЛЬНЫЙ ТАЙМЕР НА 1 ДЕНЬ ====================
        const TOTAL_CANDIES = 500;
        const now = new Date();
        const START_DATE = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate(), 0, 0, 0));
        const DURATION_MS = 24 * 60 * 60 * 1000; // 1 день
        const SPAWN_INTERVAL = DURATION_MS / TOTAL_CANDIES;

        const CANDY_IMAGE_URLS = [
            'candy1.png', 'candy2.png', 'candy3.png',
            'candy4.png', 'candy5.png', 'candy6.png',
            'candy7.png', 'candy8.png', 'candy9.png',
            'candy10.png', 'candy11.png', 'candy12.png',
            'candy13.png', 'candy14.png', 'candy15.png',
            'candy16.png', 'candy17.png', 'candy18.png'
        ];
        const CANDY_SCALE = [
            1.05, 1.05, 1.05, 0.85, 1.05, 1.05, 1.05, 1.05, 1.05,
            1.05, 1.05, 1.05, 1.05, 1.05, 0.85, 1.05, 1.05, 1.05
        ];

        let RADIUS = 12;
        let loadedImages = [];            // { img, radiusInPixels, offsetX, offsetY, scale }
        let candies = [];
        let totalSpawned = 0;
        let nextSpawnDue = 0;
        let animationId = null;
        let lastTime = 0;

        const engine = Matter.Engine.create({
            enableSleeping: true,
            positionIterations: 10,
            velocityIterations: 8,
            timing: { timeScale: 1 }
        });
        const world = engine.world;

        const BASE_GRAVITY = 1.0;
        let gyroActive = false;
        let currentGravity = { x: 0, y: BASE_GRAVITY };

        let ground, leftWall, rightWall;
        let mouse, mouseConstraint;

        // ---- НОЧНОЙ ФОН (всегда) ----
        let nightBgImage = null;
        let starImages = [];
        let stars = [];
        let blurredNightBg = null;

        function createBlurredBackground(sourceImage, blurPx) {
            const off = document.createElement('canvas');
            off.width = canvas.width;
            off.height = canvas.height;
            const offCtx = off.getContext('2d');
            offCtx.filter = `blur(${blurPx}px)`;
            offCtx.drawImage(sourceImage, 0, 0, canvas.width, canvas.height);
            offCtx.filter = 'none';
            return off;
        }

        async function loadNightBackground() {
            if (!nightBgImage) {
                nightBgImage = new Image();
                nightBgImage.src = 'fon1.jpg';
                await new Promise((resolve) => {
                    nightBgImage.onload = resolve;
                    nightBgImage.onerror = () => { nightBgImage = null; resolve(); };
                });
            }
            if (starImages.length === 0) {
                const starUrls = [];
                for (let i = 1; i <= 12; i++) starUrls.push(`star${i}.png`);
                starImages = await Promise.all(starUrls.map(url => {
                    return new Promise(resolve => {
                        const img = new Image();
                        img.src = url;
                        img.onload = () => resolve(img);
                        img.onerror = () => resolve(null);
                    });
                })).then(imgs => imgs.filter(img => img !== null));
            }
            if (stars.length === 0) {
                for (let i = 0; i < 30; i++) stars.push(createStar());
            }
            if (nightBgImage && !blurredNightBg) {
                blurredNightBg = createBlurredBackground(nightBgImage, 6);
            }
        }

        function createStar() {
            const img = starImages.length ? starImages[Math.floor(Math.random() * starImages.length)] : null;
            return {
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vy: 3 + Math.random() * 6,
                size: (0.4 + Math.random() * 0.6) * RADIUS,
                rotation: Math.random() * Math.PI * 2,
                rotationSpeed: (Math.random() - 0.5) * 0.02,
                image: img,
                alpha: 0.6 + Math.random() * 0.4
            };
        }

        function updateStars(dtSec) {
            for (const star of stars) {
                star.y += star.vy * dtSec;
                star.rotation += star.rotationSpeed * dtSec;
                if (star.y - star.size > canvas.height) {
                    star.y = -star.size - Math.random() * 50;
                    star.x = Math.random() * canvas.width;
                    star.image = starImages.length ? starImages[Math.floor(Math.random() * starImages.length)] : null;
                }
            }
        }

        function drawBackground(ctx) {
            if (blurredNightBg) {
                ctx.drawImage(blurredNightBg, 0, 0);
            } else {
                const bgGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
                bgGrad.addColorStop(0, '#0a0a1a');
                bgGrad.addColorStop(1, '#1a1a3a');
                ctx.fillStyle = bgGrad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            if (stars.length > 0) {
                ctx.save();
                ctx.filter = 'blur(2px)';
                for (const star of stars) {
                    ctx.save();
                    ctx.translate(star.x, star.y);
                    ctx.rotate(star.rotation);
                    ctx.globalAlpha = star.alpha;
                    if (star.image) {
                        const s = star.size * 2;
                        ctx.drawImage(star.image, -s/2, -s/2, s, s);
                    } else {
                        ctx.beginPath();
                        ctx.arc(0, 0, star.size, 0, Math.PI*2);
                        ctx.fillStyle = '#fff';
                        ctx.fill();
                    }
                    ctx.restore();
                }
                ctx.restore();
            }
        }

        // ---- СКРИНСЕЙВЕР (DVD-сущность) ----
        const IDLE_TIMEOUT = 300000; // 5 минут
        let lastActivity = Date.now();
        let screensaverActive = false;
        let screensaverType = 'candy'; // 'candy' или 'star'

        // Единый объект для скринсейвера
        let screensaverEntity = {
            x: 0, y: 0,
            vx: 350, vy: 350,
            image: null,
            radius: RADIUS * 2.2,
            scaleOverride: 1.0,
            radiusInPixels: RADIUS,
            offsetX: 0, offsetY: 0,
            type: 'candy'
        };

        function initScreensaverEntity(type) {
            const entity = screensaverEntity;
            entity.type = type;
            entity.x = canvas.width / 2;
            entity.y = canvas.height / 2;
            const angle = Math.random() * Math.PI * 2;
            const speed = 350;
            entity.vx = Math.cos(angle) * speed;
            entity.vy = Math.sin(angle) * speed;
            if (type === 'candy') {
                entity.radius = RADIUS * 2.2;
                pickRandomCandyImage();
            } else {
                entity.radius = RADIUS * 2.5; // звезда ещё крупнее
                pickRandomStarImage();
            }
        }

        function pickRandomCandyImage() {
            if (loadedImages.length > 0) {
                const src = loadedImages[Math.floor(Math.random() * loadedImages.length)];
                screensaverEntity.image = src.img;
                screensaverEntity.scaleOverride = src.scale || 1.0;
                screensaverEntity.radiusInPixels = src.radiusInPixels || RADIUS;
                screensaverEntity.offsetX = src.offsetX || 0;
                screensaverEntity.offsetY = src.offsetY || 0;
            }
        }

        function pickRandomStarImage() {
            if (starImages.length > 0) {
                const img = starImages[Math.floor(Math.random() * starImages.length)];
                screensaverEntity.image = img;
                screensaverEntity.scaleOverride = 1.0;
                screensaverEntity.radiusInPixels = RADIUS;
                screensaverEntity.offsetX = 0;
                screensaverEntity.offsetY = 0;
            }
        }

        function updateScreensaverEntity(dtSec) {
            const e = screensaverEntity;
            e.x += e.vx * dtSec;
            e.y += e.vy * dtSec;

            const r = e.radius;
            let bounced = false;

            if (e.x - r < 0) {
                e.x = r;
                e.vx = Math.abs(e.vx);
                bounced = true;
            } else if (e.x + r > canvas.width) {
                e.x = canvas.width - r;
                e.vx = -Math.abs(e.vx);
                bounced = true;
            }
            if (e.y - r < 0) {
                e.y = r;
                e.vy = Math.abs(e.vy);
                bounced = true;
            } else if (e.y + r > canvas.height) {
                e.y = canvas.height - r;
                e.vy = -Math.abs(e.vy);
                bounced = true;
            }

            if (bounced) {
                if (e.type === 'candy') {
                    pickRandomCandyImage();
                } else {
                    pickRandomStarImage();
                }
            }
        }

        function drawScreensaverEntity(ctx) {
            const e = screensaverEntity;
            const img = e.image;
            if (!img) return;
            ctx.save();
            ctx.translate(e.x, e.y);
            if (e.type === 'star') {
                // Без размытия, только свечение
                ctx.globalAlpha = 1;
                ctx.shadowColor = 'rgba(255, 255, 200, 0.9)';
                ctx.shadowBlur = 15;
            } else {
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 10;
            }
            const r = e.radius;
            const scale = r / (e.radiusInPixels || r);
            const baseW = img.naturalWidth * scale;
            const baseH = img.naturalHeight * scale;
            const drawOffX = (e.offsetX || 0) * scale;
            const drawOffY = (e.offsetY || 0) * scale;
            const finalW = baseW * e.scaleOverride;
            const finalH = baseH * e.scaleOverride;
            ctx.drawImage(img, -finalW/2 + drawOffX, -finalH/2 + drawOffY, finalW, finalH);
            ctx.restore();
        }

        function activateScreensaver() {
            screensaverActive = true;
            if (Math.random() < 0.05) {
                screensaverType = 'star';
            } else {
                screensaverType = 'candy';
            }
            initScreensaverEntity(screensaverType);
        }

        function resetActivity() {
            lastActivity = Date.now();
            if (screensaverActive) {
                screensaverActive = false;
                // возвращаем обычный режим
            }
        }

        // ---- Кастомный курсор ----
        const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        let customCursorEnabled = false;

        function enableCustomCursor() {
            if (isTouchDevice) return;
            customCursorEnabled = true;
            document.body.classList.add('custom-cursor-active');
            cursorImg.style.display = 'block';
            cursorImg.src = 'hand1.png';
        }

        function disableCustomCursor() {
            customCursorEnabled = false;
            document.body.classList.remove('custom-cursor-active');
            cursorImg.style.display = 'none';
        }

        function updateCursorPosition(e) {
            if (!customCursorEnabled) return;
            cursorImg.style.left = e.clientX + 'px';
            cursorImg.style.top = e.clientY + 'px';
        }

        function onMouseDown(e) {
            if (!customCursorEnabled) return;
            const mousePos = { x: e.clientX, y: e.clientY };
            const bodiesUnder = Matter.Query.point(candies, mousePos);
            if (bodiesUnder.length > 0) {
                cursorImg.src = 'hand2.png';
            }
            resetActivity();
        }

        function onMouseUp(e) {
            if (!customCursorEnabled) return;
            cursorImg.src = 'hand1.png';
            resetActivity();
        }

        function setupCustomCursor() {
            if (isTouchDevice) {
                disableCustomCursor();
                return;
            }
            enableCustomCursor();
            document.addEventListener('mousemove', (e) => {
                updateCursorPosition(e);
                resetActivity();
            });
            document.addEventListener('mousedown', onMouseDown);
            document.addEventListener('mouseup', onMouseUp);
            document.addEventListener('keydown', resetActivity);

            document.addEventListener('mouseleave', () => {
                if (customCursorEnabled) cursorImg.style.display = 'none';
            });
            document.addEventListener('mouseenter', () => {
                if (customCursorEnabled) cursorImg.style.display = 'block';
            });
        }

        // --------------- ЗВУК ---------------
        let audioCtx = null;
        let soundBuffer = null;
        let lastSoundTime = 0;
        const SOUND_MIN_INTERVAL = 0.08;
        const SOUND_PROBABILITY = 0.5;
        const MIN_COLLISION_SPEED = 0.5;

        async function loadSound(url) {
            try {
                const response = await fetch(url);
                const arrayBuffer = await response.arrayBuffer();
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                soundBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                console.log('Звук загружен');
            } catch (e) {
                console.warn('Не удалось загрузить звук:', url, e);
            }
        }

        function playSoundWithPitch(pitchMultiplier = 1.0, volume = 0.15) {
            if (!audioCtx || !soundBuffer) return;
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const source = audioCtx.createBufferSource();
            source.buffer = soundBuffer;
            source.playbackRate.value = pitchMultiplier;
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            source.connect(gain);
            gain.connect(audioCtx.destination);
            source.start();
            source.onended = () => source.disconnect();
        }

        function tryPlayCollisionSound(pitchRange, bodyA, bodyB) {
            const relVelX = bodyA.velocity.x - bodyB.velocity.x;
            const relVelY = bodyA.velocity.y - bodyB.velocity.y;
            const relSpeed = Math.sqrt(relVelX * relVelX + relVelY * relVelY);
            if (relSpeed < MIN_COLLISION_SPEED) return;

            const now = performance.now();
            if (now - lastSoundTime < SOUND_MIN_INTERVAL * 1000) return;
            if (Math.random() > SOUND_PROBABILITY) return;
            lastSoundTime = now;

            const pitch = pitchRange[0] + Math.random() * (pitchRange[1] - pitchRange[0]);
            playSoundWithPitch(pitch, 0.15);
        }

        function setupCollisionEvents() {
            Matter.Events.on(engine, 'collisionStart', (event) => {
                for (const pair of event.pairs) {
                    const bodyA = pair.bodyA;
                    const bodyB = pair.bodyB;
                    if (bodyA.isStatic || bodyB.isStatic) {
                        if (bodyA === ground || bodyB === ground ||
                            bodyA === leftWall || bodyB === leftWall ||
                            bodyA === rightWall || bodyB === rightWall) {
                            tryPlayCollisionSound([0.8, 0.95], bodyA, bodyB);
                        }
                    } else {
                        tryPlayCollisionSound([0.9, 1.1], bodyA, bodyB);
                    }
                    break;
                }
            });
        }

        // --------------- ГИРОСКОП ------------------
        function setupGyro() {
            if (!window.DeviceOrientationEvent) return;
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                gyroBtn.style.display = 'block';
                gyroBtn.addEventListener('click', async () => {
                    try {
                        const perm = await DeviceOrientationEvent.requestPermission();
                        if (perm === 'granted') {
                            enableGyro();
                            gyroBtn.style.display = 'none';
                        }
                    } catch (e) {}
                }, { once: true });
            } else {
                enableGyro();
            }
        }

        function enableGyro() {
            window.addEventListener('deviceorientation', handleOrientation);
            gyroActive = true;
        }

        function handleOrientation(event) {
            if (!event.beta || !event.gamma) return;
            const degToRad = Math.PI / 180;
            const gx = Math.sin(event.gamma * degToRad);
            const gy = Math.sin(event.beta * degToRad);
            const len = Math.sqrt(gx*gx + gy*gy) || 1;
            currentGravity = { x: (gx/len)*BASE_GRAVITY, y: (gy/len)*BASE_GRAVITY };
            engine.gravity.x = currentGravity.x;
            engine.gravity.y = currentGravity.y;
        }

        // --------------- АНАЛИЗ ИЗОБРАЖЕНИЙ ---------------
        function analyzeImageSafely(img) {
            const w = img.naturalWidth, h = img.naturalHeight;
            if (w === 0 || h === 0) return { radiusInPixels: RADIUS, offsetX: 0, offsetY: 0 };
            try {
                const off = document.createElement('canvas');
                off.width = w; off.height = h;
                const offCtx = off.getContext('2d');
                offCtx.drawImage(img, 0, 0);
                const data = offCtx.getImageData(0, 0, w, h).data;
                let minX = w, minY = h, maxX = 0, maxY = 0;
                for (let y = 0; y < h; y++) {
                    for (let x = 0; x < w; x++) {
                        if (data[(y*w+x)*4+3] > 10) {
                            if (x < minX) minX = x;
                            if (y < minY) minY = y;
                            if (x > maxX) maxX = x;
                            if (y > maxY) maxY = y;
                        }
                    }
                }
                if (minX > maxX) { minX = 0; minY = 0; maxX = w-1; maxY = h-1; }
                const rad = Math.max(maxX-minX+1, maxY-minY+1) / 2;
                const offX = w/2 - (minX+maxX)/2;
                const offY = h/2 - (minY+maxY)/2;
                return { radiusInPixels: rad, offsetX: offX, offsetY: offY };
            } catch (e) {
                return { radiusInPixels: Math.max(w,h)/2, offsetX: 0, offsetY: 0 };
            }
        }

        async function loadImages(urls, scales) {
            if (!urls?.length) return [];
            const proms = urls.map((url, i) => new Promise(resolve => {
                const img = new Image();
                img.src = url;
                img.onload = () => {
                    const analysis = analyzeImageSafely(img);
                    resolve({ img, ...analysis, scale: scales[i] || 1.0 });
                };
                img.onerror = () => resolve(null);
            }));
            return (await Promise.all(proms)).filter(i => i);
        }

        // --------------- КОНФЕТЫ ---------------
        function spawnCandy() {
            const r = RADIUS;
            const src = loadedImages.length ? loadedImages[Math.floor(Math.random() * loadedImages.length)] : null;
            const img = src?.img || null;
            const radPx = src?.radiusInPixels || r;
            const offX = src?.offsetX || 0;
            const offY = src?.offsetY || 0;
            const scaleOverride = src?.scale || 1.0;

            const body = Matter.Bodies.circle(0, 0, r, {
                restitution: 0.35, friction: 0.6, frictionAir: 0.05, density: 0.005
            });
            const x = r + Math.random() * (canvas.width - 2*r);
            const y = -r - Math.random() * 200;
            Matter.Body.setPosition(body, { x, y });

            body.renderData = {
                image: img, color: `hsl(${Math.random()*360},70%,75%)`,
                radiusInPixels: radPx, offsetX: offX, offsetY: offY, scaleOverride
            };
            Matter.World.add(world, body);
            candies.push(body);
            totalSpawned++;
        }

        function rapidInitialDrop(targetCount) {
            if (totalSpawned >= targetCount) return;
            const batchSize = 20;
            const interval = 150;
            const dropBatch = () => {
                const toSpawn = Math.min(batchSize, targetCount - totalSpawned);
                for (let i = 0; i < toSpawn; i++) {
                    spawnCandy();
                }
                if (totalSpawned < targetCount) {
                    setTimeout(dropBatch, interval);
                }
            };
            dropBatch();
        }

        // --------------- ОТРИСОВКА ---------------
        function drawCandy(ctx, body, alpha = 1) {
            const rd = body.renderData;
            if (!rd) return;
            const { x, y } = body.position;
            const angle = body.angle;
            const img = rd.image;
            const color = rd.color;
            const radPx = rd.radiusInPixels || RADIUS;
            const offX = rd.offsetX || 0;
            const offY = rd.offsetY || 0;
            const r = RADIUS;
            const scaleOverride = rd.scaleOverride || 1.0;

            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.globalAlpha = alpha;
            ctx.shadowColor = 'rgba(0,0,0,0.2)';
            ctx.shadowBlur = 4;
            ctx.shadowOffsetY = 2;

            if (img?.complete && img.naturalWidth > 0) {
                const scale = r / radPx;
                const baseW = img.naturalWidth * scale, baseH = img.naturalHeight * scale;
                const drawOffX = offX * scale, drawOffY = offY * scale;
                ctx.drawImage(img,
                    -baseW/2*scaleOverride + drawOffX,
                    -baseH/2*scaleOverride + drawOffY,
                    baseW*scaleOverride, baseH*scaleOverride);
            } else {
                const rad = r * scaleOverride;
                const grad = ctx.createRadialGradient(-rad*0.3, -rad*0.3, rad*0.1, 0, 0, rad);
                grad.addColorStop(0, '#fff');
                grad.addColorStop(0.4, color);
                grad.addColorStop(1, shade(color, -30));
                ctx.beginPath(); ctx.arc(0,0,rad,0,Math.PI*2); ctx.fillStyle=grad; ctx.fill();
                ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=rad*0.2; ctx.stroke();
            }
            ctx.restore();
        }

        function shade(hex,p) {
            if (hex.startsWith('hsl')) return '#f0c0d0';
            const num=parseInt(hex.slice(1),16);
            const r=Math.min(255,Math.max(0,(num>>16)+p));
            const g=Math.min(255,Math.max(0,((num>>8)&0xFF)+p));
            const b=Math.min(255,Math.max(0,(num&0xFF)+p));
            return `rgb(${r},${g},${b})`;
        }

        function drawScene() {
            if (screensaverActive) {
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                drawScreensaverEntity(ctx);
            } else {
                drawBackground(ctx);
                const sorted = [...candies].sort((a,b) => a.position.y - b.position.y);
                for (const b of sorted) drawCandy(ctx, b, 1);
            }
        }

        function gameLoop(timestamp) {
            if (!animationId) return;
            const dtMs = Math.min(50, timestamp - (lastTime || timestamp));
            lastTime = timestamp;
            const dtSec = dtMs / 1000;

            if (!screensaverActive && Date.now() - lastActivity > IDLE_TIMEOUT) {
                activateScreensaver();
            }

            if (screensaverActive) {
                updateScreensaverEntity(dtSec);
            } else {
                updateStars(dtSec);

                const nowTs = Date.now();
                if (totalSpawned < TOTAL_CANDIES && nowTs >= nextSpawnDue) {
                    const elapsed = nowTs - START_DATE.getTime();
                    const expectedTotal = Math.min(TOTAL_CANDIES, Math.floor(elapsed / SPAWN_INTERVAL));
                    while (totalSpawned < expectedTotal) {
                        spawnCandy();
                    }
                    nextSpawnDue = START_DATE.getTime() + (totalSpawned + 1) * SPAWN_INTERVAL;
                }

                Matter.Engine.update(engine, dtMs);
            }

            drawScene();
            animationId = requestAnimationFrame(gameLoop);
        }

        function onResize() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const newR = calcRadius();
            if (nightBgImage) {
                blurredNightBg = createBlurredBackground(nightBgImage, 6);
            }

            if (newR !== RADIUS) {
                RADIUS = newR;
                createBoundaries();
                for (const b of candies) Matter.World.remove(world, b);
                candies = [];
                totalSpawned = 0;
                const elapsed = Date.now() - START_DATE.getTime();
                const expected = Math.min(TOTAL_CANDIES, Math.floor(elapsed / SPAWN_INTERVAL));
                rapidInitialDrop(expected);
                if (totalSpawned < TOTAL_CANDIES) {
                    nextSpawnDue = START_DATE.getTime() + (totalSpawned + 1) * SPAWN_INTERVAL;
                }
            } else {
                createBoundaries();
                for (const b of candies) Matter.Body.setPosition(b, {
                    x: Math.min(Math.max(b.position.x, RADIUS), canvas.width - RADIUS),
                    y: Math.min(Math.max(b.position.y, RADIUS), canvas.height - RADIUS)
                });
            }

            stars = [];
            for (let i = 0; i < 30; i++) stars.push(createStar());
            createMouse();
        }
        window.addEventListener('resize', onResize);

        function calcRadius() {
            const w = canvas.width, h = canvas.height;
            const minDim = Math.min(w, h);
            return Math.max(6, Math.min(40, Math.floor(minDim / 24)));
        }

        function createBoundaries() {
            if (ground) Matter.World.remove(world, ground);
            if (leftWall) Matter.World.remove(world, leftWall);
            if (rightWall) Matter.World.remove(world, rightWall);
            const w = canvas.width, h = canvas.height;
            ground = Matter.Bodies.rectangle(w/2, h + 50, w, 100, { isStatic: true, friction: 0.8 });
            leftWall = Matter.Bodies.rectangle(-50, h/2, 100, h, { isStatic: true });
            rightWall = Matter.Bodies.rectangle(w + 50, h/2, 100, h, { isStatic: true });
            Matter.World.add(world, [ground, leftWall, rightWall]);
        }

        function createMouse() {
            if (mouseConstraint) Matter.World.remove(world, mouseConstraint);
            mouse = Matter.Mouse.create(canvas);
            mouseConstraint = Matter.MouseConstraint.create(engine, {
                mouse: mouse,
                constraint: { stiffness: 0.2, render: { visible: false } }
            });
            Matter.World.add(world, mouseConstraint);
        }

        window.addEventListener('mousemove', resetActivity);
        window.addEventListener('mousedown', resetActivity);
        window.addEventListener('touchstart', resetActivity, { passive: true });
        window.addEventListener('touchmove', resetActivity, { passive: true });
        window.addEventListener('keydown', resetActivity);

        async function init() {
            try {
                canvas.width = window.innerWidth; canvas.height = window.innerHeight;
                RADIUS = calcRadius();
                loadedImages = await loadImages(CANDY_IMAGE_URLS, CANDY_SCALE);
                createBoundaries();
                createMouse();
                setupGyro();
                setupCustomCursor();

                await loadSound('sound1.mp3');
                setupCollisionEvents();

                await loadNightBackground();

                const elapsed = Date.now() - START_DATE.getTime();
                const expectedCount = Math.min(TOTAL_CANDIES, Math.floor(elapsed / SPAWN_INTERVAL));
                rapidInitialDrop(expectedCount);

                if (totalSpawned < TOTAL_CANDIES) {
                    nextSpawnDue = START_DATE.getTime() + (totalSpawned + 1) * SPAWN_INTERVAL;
                }

                lastTime = 0;
                lastActivity = Date.now();
                if (animationId) cancelAnimationFrame(animationId);
                animationId = requestAnimationFrame(gameLoop);

            } catch (e) {
                console.error('Ошибка инициализации:', e);
                RADIUS = calcRadius() || 12;
                createBoundaries();
                lastTime = 0;
                animationId = requestAnimationFrame(gameLoop);
            }
        }
        init();
    })();
    </script>
</body>
</html>
